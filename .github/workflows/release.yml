# PinSlip 出包流水线
#
# 触发方式：
#   1. 打 tag 推送（如 git tag v0.5.2 && git push origin v0.5.2）→ 双端出包 + 自动建 GitHub Release（草稿）
#   2. Actions 页手动 Run workflow → 只出包传 artifacts，不建 Release（用于验链路）
#
# 产物：
#   - Windows (x64)：PinSlip-Setup-<version>.exe（NSIS）+ latest.yml
#   - macOS：       PinSlip-<version>-arm64.dmg（Apple Silicon）+ PinSlip-<version>-x64.dmg（Intel）
#                   + latest-mac.yml（单腿产出双 dmg，共用一份更新元信息）
#   latest*.yml 与 *.blockmap 是 electron-updater 自动更新的元信息，必须随安装包一起进 Release
#   mac 包均未签名，首次打开需右键 → 打开
#
# 设计说明：
#   - SQLite 用纯 Go 驱动（modernc.org/sqlite，CGO_ENABLED=0）：
#     mac 的 pinslipd 在 arm64 runner 上交叉编译 arm64+amd64 后用 lipo 合成 universal 二进制
#     （PINSLIP_MAC_UNIVERSAL=1，见 scripts/build-service.js），无需 Intel runner
#   - mac 单腿出双 dmg：两腿分打会各产一份 latest-mac.yml 互相覆盖，导致自动更新元信息只剩一腿
#   - mac 签名/公证需要 Apple 开发者账号（$99/年）：拿到证书后设置 CSC_LINK / CSC_KEY_PASSWORD
#     secrets 并移除 CSC_IDENTITY_AUTO_DISCOVERY=false 即可启用

name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write # 创建 GitHub Release 需要

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            suffix: windows-x64
            eb: --win
          - os: macos-latest
            suffix: mac
            eb: --mac   # yml 已列 [arm64, x64]，一次出双 dmg + 合并 latest-mac.yml
    runs-on: ${{ matrix.os }}
    env:
      # mac 腿：交叉编译 + lipo 合成 universal pinslipd（win 腿此变量为空，走原生编译）
      PINSLIP_MAC_UNIVERSAL: ${{ matrix.os == 'macos-latest' && '1' || '' }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 11

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - uses: actions/setup-go@v5
        with:
          go-version-file: apps/service/go.mod

      - run: pnpm install --frozen-lockfile

      - name: 编译 Go 服务
        run: pnpm build:service

      - name: 构建桌面端
        run: pnpm --filter @pinslip/desktop build

      - name: 打包安装包
        # --publish never：CI 环境检出 publish 配置后 electron-builder 默认尝试发布（onTagOrDraft），
        # 没有 GH_TOKEN 会报错；Release 由下方 action-gh-release 统一创建
        run: pnpm --filter @pinslip/desktop exec electron-builder ${{ matrix.eb }} --publish never
        env:
          # 暂无 Apple 签名证书：跳过 macOS 证书探测，避免打包失败
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'

      - uses: actions/upload-artifact@v4
        with:
          name: pinslip-${{ matrix.suffix }}
          path: |
            apps/desktop/release/*.exe
            apps/desktop/release/*.dmg
            apps/desktop/release/latest*.yml
            apps/desktop/release/*.blockmap
          if-no-files-found: error

  # 仅 tag 推送时：汇总双端产物建 Release 草稿（人工检查后再发布）
  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    env:
      # COS 镜像同步开关：Secrets 未配置时自动跳过（开桶前发布不阻塞流程）
      SYNC_COS: ${{ secrets.COS_SECRET_ID != '' }}
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - uses: softprops/action-gh-release@v2
        with:
          draft: true
          generate_release_notes: true
          files: dist/**/*

      # 同步更新镜像到腾讯云 COS（国内兜底更新源，见 docs/ops-update-mirror.md）：
      # latest*.yml 每次覆盖更新，是镜像端「最新版本」的唯一事实源；
      # 桶名/Endpoint 是公开信息（客户端 MIRROR_URL 同款），密钥走 Secrets
      - name: 同步更新镜像到腾讯云 COS
        if: env.SYNC_COS == 'true'
        run: |
          curl -s https://rclone.org/install.sh | sudo bash
          rclone copy dist/ cos:pinslip-1256167691/ \
            --include "latest*.yml" --include "*.exe" --include "*.dmg" --include "*.blockmap" \
            --checksum -v
        env:
          RCLONE_CONFIG_COS_TYPE: s3
          RCLONE_CONFIG_COS_PROVIDER: TencentCOS
          RCLONE_CONFIG_COS_ACCESS_KEY_ID: ${{ secrets.COS_SECRET_ID }}
          RCLONE_CONFIG_COS_SECRET_ACCESS_KEY: ${{ secrets.COS_SECRET_KEY }}
          RCLONE_CONFIG_COS_ENDPOINT: cos.ap-guangzhou.myqcloud.com
