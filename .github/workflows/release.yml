# PinSlip 出包流水线
#
# 触发方式：
#   1. 打 tag 推送（如 git tag v0.5.0 && git push origin v0.5.0）→ 双平台出包 + 自动建 GitHub Release（草稿）
#   2. Actions 页手动 Run workflow → 只出包传 artifacts，不建 Release（用于验链路）
#
# 产物：
#   - Windows：PinSlip-Setup-<version>.exe（NSIS）
#   - macOS：  PinSlip-<version>-arm64.dmg（仅 Apple Silicon；未签名，首次打开需右键 → 打开）
#
# 设计说明：
#   - SQLite 用纯 Go 驱动（modernc.org/sqlite，CGO_ENABLED=0），任何平台原生编译即可，无 gcc 依赖
#   - mac 签名/公证需要 Apple 开发者账号（$99/年）：拿到证书后设置 CSC_LINK / CSC_KEY_PASSWORD
#     secrets 并移除 CSC_IDENTITY_AUTO_DISCOVERY=false 即可启用

name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write # 创建 GitHub Release 需要

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 11

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - uses: actions/setup-go@v5
        with:
          go-version-file: apps/service/go.mod

      - run: pnpm install --frozen-lockfile

      # pnpm dist = build:service（Go 编译）+ electron-builder（按当前平台出包）
      - name: 编译 Go 服务并打包
        run: pnpm dist
        env:
          # 暂无 Apple 签名证书：跳过 macOS 证书探测，避免打包失败
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'

      - uses: actions/upload-artifact@v4
        with:
          name: pinslip-${{ matrix.os }}
          path: |
            apps/desktop/release/*.exe
            apps/desktop/release/*.dmg
          if-no-files-found: error

  # 仅 tag 推送时：汇总双平台产物建 Release 草稿（人工检查后再发布）
  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - uses: softprops/action-gh-release@v2
        with:
          draft: true
          generate_release_notes: true
          files: dist/**/*
