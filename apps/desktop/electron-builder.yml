# electron-builder 配置：产出 Windows NSIS 安装包 / macOS DMG
# Go 二进制通过 extraResources 随包携带（先跑 pnpm build:service）

appId: app.pinslip
productName: PinSlip
copyright: Copyright © 2026 PinSlip

# 自动更新元信息：构建时把 latest.yml / latest-mac.yml 发布到 GitHub Releases，
# 运行期 electron-updater 按此地址检查更新（公开仓库，无需 token）
publish:
  provider: github
  owner: homerious
  repo: pinslip

directories:
  output: release

# asar 内只放运行时必需的内容（渲染层/主进程已由 electron-vite 打包进 out/）
files:
  - out/**
  - package.json
  - resources/icon.png
  - resources/icon.ico

# Go 服务二进制 → 安装目录 resources/service/
# 对应 go-process.ts 中 app.isPackaged 分支的解析路径
extraResources:
  - from: resources/service
    to: service
    filter:
      - "**/*"

win:
  target:
    - target: nsis
      arch:
        - x64
  icon: resources/icon.ico

# macOS：arm64（Apple Silicon）+ x64（Intel）双架构 dmg，单腿产出；
# pinslipd 由 build-service.js 交叉编译后用 lipo 合成 universal 二进制，
# 两个 dmg 共享同一份 latest-mac.yml（electron-updater 按进程架构选对应 dmg）
mac:
  target:
    - target: dmg
      arch:
        - arm64
        - x64
  icon: resources/icon.png               # 1024px，mac runner 上 electron-builder 自动转 icns
  category: public.app-category.productivity

nsis:
  oneClick: false                        # 安装向导式，用户可选安装路径
  perMachine: false                      # 按用户安装，免管理员权限
  allowToChangeInstallationDirectory: true
  displayLanguageSelector: true          # 安装开始时显示语言选择框（默认已随系统区域自动切换并内置简/繁中文等 ~40 种语言）
  shortcutName: PinSlip
  artifactName: ${productName}-Setup-${version}.${ext}
